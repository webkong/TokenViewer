name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.0)"
        required: true
      build_number:
        description: "Build number"
        required: true
        default: "20000"

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          BUILD="${{ inputs.build_number || '10000' }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV
          echo "RELEASE_TAG=v$VERSION" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            core/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: rust-

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Build Rust core
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cd core && cargo build --release --target aarch64-apple-darwin

      - name: Build DMG
        env:
          CODE_SIGN_IDENTITY: "-"
          SKIP_RUST_BUILD: "1"
        run: |
          chmod +x script/release.sh script/version_utils.sh
          VERSION=${{ env.VERSION }} BUILD_NUMBER=${{ env.BUILD_NUMBER }} ./script/release.sh build-dmg

      - name: Create release notes if missing
        run: |
          mkdir -p docs/releases
          NOTES_FILE="docs/releases/v${{ env.VERSION }}.md"
          if [[ ! -f "$NOTES_FILE" ]]; then
            echo "## TokenViewer v${{ env.VERSION }}" > "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "Release v${{ env.VERSION }}" >> "$NOTES_FILE"
          fi

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_DMG_BUILD: "1"
        run: |
          VERSION=${{ env.VERSION }} BUILD_NUMBER=${{ env.BUILD_NUMBER }} \
          GITHUB_RELEASE_REPO="${{ github.repository }}" \
          RELEASE_TAG="v${{ env.VERSION }}" \
          RELEASE_NOTES_FILE="docs/releases/v${{ env.VERSION }}.md" \
          ./script/release.sh push-release

  deploy-website:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Build website
        run: cd website && npm ci && npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/dist
          cname: tokenviewer.webkong.top
