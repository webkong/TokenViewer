name: TokenViewer
options:
  bundleIdPrefix: com.tokenviewer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    MARKETING_VERSION: "0.2.10"
    CURRENT_PROJECT_VERSION: 20900
    SWIFT_VERSION: "5.9"

targets:
  TokenViewer:
    type: application
    platform: macOS
    sources:
      - path: TokenViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenviewer.app
        INFOPLIST_FILE: TokenViewer/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/../core/target/aarch64-apple-darwin/release"
          - "/opt/homebrew/opt/openssl/lib"
        OTHER_LDFLAGS:
          - "-force_load"
          - "$(PROJECT_DIR)/../core/target/aarch64-apple-darwin/release/libtokenviewer_core.a"
          - "-framework"
          - "Security"
          - "-framework"
          - "SystemConfiguration"
          - "-lz"
          - "-liconv"
          - "-lssl"
          - "-lcrypto"
        SWIFT_OBJC_BRIDGING_HEADER: "TokenViewer/Bridge/TokenViewer-Bridging-Header.h"
    entitlements:
      path: TokenViewer/Resources/TokenViewer.entitlements
    preBuildScripts:
      - name: Build Rust Core
        script: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cd "$PROJECT_DIR/../core"
          cargo build --release --target aarch64-apple-darwin
        outputFiles:
          - "$(PROJECT_DIR)/../core/target/aarch64-apple-darwin/release/libtokenviewer_core.a"
  TokenViewerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TokenViewerTests
    dependencies:
      - target: TokenViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenviewer.tests
        GENERATE_INFOPLIST_FILE: YES
